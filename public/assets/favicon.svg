<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <style>
        .stroke { stroke: #363028; }
        
        @media (prefers-color-scheme: dark) {
            .stroke { stroke: #A898AE; }
        }
    </style>
    
    <g class="stroke" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="50" cy="50" r="1.5" fill="currentColor" class="stroke" />
        
        <circle cx="50" cy="50" r="15" stroke-dasharray="35 60" stroke-dashoffset="10" />
        
        <circle cx="50" cy="50" r="30" stroke-dasharray="50 45 40 54" stroke-dashoffset="140" />
        
        <circle cx="50" cy="50" r="45" stroke-dasharray="70 80 60 73" stroke-dashoffset="20" />
    </g>
</svg>
